<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Write</title>
  <style>
    :root {
      --paper: rgba(255, 252, 246, 0.92);
      --ink: #1f1d1a;
      --muted: #665d52;
      --line: rgba(31, 29, 26, 0.12);
      --accent: #c65f37;
      --shadow: 0 24px 60px rgba(55, 42, 24, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(198, 95, 55, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(49, 87, 70, 0.18), transparent 24%),
        linear-gradient(180deg, #f7f1e7 0%, #efe6d6 100%);
    }
    .page-shell { width: min(920px, calc(100% - 32px)); margin: 24px auto 48px; }
    .hero, .panel {
      border: 1px solid var(--line);
      background: var(--paper);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }
    .hero { padding: 24px; }
    .panel { padding: 28px; margin-top: 24px; }
    .topbar, .form-actions, .saved-card {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }
    .nav-links, .form-actions { display: flex; flex-wrap: wrap; gap: 12px; }
    .brand, .eyebrow, .saved-meta { text-transform: uppercase; letter-spacing: 0.08em; }
    .brand { font-weight: 700; }
    .nav-links a, a { color: inherit; text-decoration: none; }
    .hero-copy { padding: 34px 0 8px; max-width: 620px; }
    .eyebrow { color: var(--accent); font-size: 0.78rem; font-weight: 700; margin-bottom: 12px; }
    h1, h2, h3 { margin: 0; line-height: 1; }
    h1 { font-size: clamp(2.1rem, 5vw, 3.6rem); max-width: 12ch; }
    h2 { font-size: clamp(1.6rem, 4vw, 2.5rem); }
    .intro, .form-status, .empty-state, .saved-meta, .saved-card p { color: var(--muted); }
    .intro { font-size: 1rem; line-height: 1.6; max-width: 50ch; margin: 16px 0 0; }
    .auth-panel {
      margin-bottom: 20px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255,255,255,0.66);
    }
    .editor-form { display: grid; gap: 16px; }
    label { display: grid; gap: 8px; font-weight: 500; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      font: inherit;
      color: var(--ink);
      background: rgba(255,255,255,0.85);
    }
    textarea { resize: vertical; }
    .button {
      border-radius: 999px;
      padding: 12px 18px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid var(--line);
      cursor: pointer;
      background: rgba(255,255,255,0.5);
    }
    .button.primary { background: var(--ink); color: #fff9f0; border-color: var(--ink); }
    .saved-card {
      align-items: flex-start;
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 20px;
      background: rgba(255,255,255,0.66);
      margin-top: 16px;
    }
    .saved-card h3 { margin: 6px 0 10px; }
    .saved-card p { line-height: 1.6; }
    .small-button { padding: 10px 14px; }
    @media (max-width: 700px) {
      .topbar, .saved-card { flex-direction: column; align-items: flex-start; }
      .page-shell { width: min(100% - 20px, 920px); margin: 10px auto 24px; }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <nav class="topbar">
        <span class="brand">veera.dev</span>
        <div class="nav-links">
          <a href="/">Home</a>
          <a href="#editor">Write</a>
        </div>
      </nav>
      <div class="hero-copy">
        <p class="eyebrow">Write</p>
        <h1>Create and manage your content.</h1>
        <p class="intro">Add notes, documents, links, and project entries from one clean editor.</p>
      </div>
    </header>

    <main>
      <section class="panel" id="editor">
        <div class="section-heading">
          <p class="eyebrow">New entry</p>
          <h2>New post</h2>
        </div>
        <div class="auth-panel">
          <div class="form-actions">
            <button class="button primary" id="sign-in" type="button">Sign in with Google</button>
            <button class="button" id="sign-out" type="button" hidden>Sign out</button>
          </div>
          <p class="form-status" id="auth-status"></p>
        </div>
        <form class="editor-form" id="entry-form">
          <label>
            Section
            <select id="entry-type" name="type">
              <option value="notes">Notes</option>
              <option value="documents">Documents</option>
              <option value="links">Links</option>
              <option value="projects">Projects</option>
            </select>
          </label>
          <label>
            Tag or label
            <input id="entry-tag" name="tag" type="text" placeholder="Tech, Resume, DevOps" />
          </label>
          <label>
            Title
            <input id="entry-title" name="title" type="text" placeholder="My first post" required />
          </label>
          <label>
            Description
            <textarea id="entry-description" name="description" rows="5" placeholder="Write a summary, note, or explanation..." required></textarea>
          </label>
          <label>
            URL
            <input id="entry-url" name="url" type="url" placeholder="https://example.com" />
          </label>
          <div class="form-actions">
            <button class="button primary" type="submit">Save entry</button>
            <button class="button" id="clear-all" type="button">Clear saved entries</button>
          </div>
          <p class="form-status" id="form-status"></p>
        </form>
      </section>

      <section class="panel">
        <div class="section-heading">
          <p class="eyebrow">Saved items</p>
          <h2>What you have written so far</h2>
        </div>
        <div class="saved-list" id="saved-list"></div>
      </section>
    </main>
  </div>
  <script type="module" src="/firebase-site.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Write Content</title>
    <meta
        name="description"
        content="Write notes, links, documents, and portfolio entries for your personal site."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Newsreader:opsz,wght@6..72,400;700&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="page-shell">
        <header class="hero compact-hero">
            <nav class="topbar">
                <span class="brand">veera.devopssec</span>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="#editor">Write</a>
                </div>
            </nav>

            <div class="hero-copy compact-copy">
                <p class="eyebrow">Write</p>
                <h1>Create and manage your content.</h1>
                <p class="intro">
                    Add notes, documents, links, and project entries from one clean editor.
                </p>
            </div>
        </header>

        <main>
            <section class="panel" id="editor">
                <div class="section-heading">
                    <p class="eyebrow">New entry</p>
                    <h2>New post</h2>
                </div>

                <div class="auth-panel">
                    <p class="storage-notice" id="storage-notice">Checking Firebase connection...</p>
                    <div class="form-actions">
                        <button class="button primary" id="sign-in" type="button">Sign in with Google</button>
                        <button class="button secondary" id="sign-out" type="button" hidden>Sign out</button>
                    </div>
                    <p class="form-status" id="auth-status" aria-live="polite"></p>
                </div>

                <form class="editor-form" id="entry-form">
                    <label>
                        Section
                        <select id="entry-type" name="type">
                            <option value="notes">Notes</option>
                            <option value="documents">Documents</option>
                            <option value="links">Links</option>
                            <option value="projects">Projects</option>
                        </select>
                    </label>

                    <label>
                        Tag or label
                        <input id="entry-tag" name="tag" type="text" placeholder="Tech, Resume, DevOps" />
                    </label>

                    <label>
                        Title
                        <input id="entry-title" name="title" type="text" placeholder="My first post" required />
                    </label>

                    <label>
                        Description
                        <textarea
                            id="entry-description"
                            name="description"
                            rows="5"
                            placeholder="Write a summary, note, or explanation..."
                            required
                        ></textarea>
                    </label>

                    <label>
                        URL
                        <input id="entry-url" name="url" type="url" placeholder="https://example.com" />
                    </label>

                    <div class="form-actions">
                        <button class="button primary" type="submit">Save entry</button>
                        <button class="button secondary" id="clear-all" type="button">Clear saved entries</button>
                    </div>
                    <p class="form-status" id="form-status" aria-live="polite"></p>
                </form>
            </section>

            <section class="panel">
                <div class="section-heading">
                    <p class="eyebrow">Saved items</p>
                    <h2>What you have written so far</h2>
                </div>
                <div class="saved-list" id="saved-list"></div>
            </section>
        </main>
    </div>
    <script type="module" src="firebase-site.js"></script>
</body>
</html>
